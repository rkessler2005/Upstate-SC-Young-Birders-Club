<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Upstate SC Young Birders</title>

  <style>
    :root {
      --forest: #243d2f;
      --cream: #f7f1e6;
      --clay: #b46f43;
      --ink: #1e2a22;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Georgia, serif;
      background: var(--cream);
      color: var(--ink);
      line-height: 1.6;
    }

    nav {
      padding: 1.2rem 6vw;
      display: flex;
      justify-content: space-between;
      background: var(--forest);
      color: white;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin-left: 1rem;
      font-family: Arial, sans-serif;
      text-transform: uppercase;
      font-size: .8rem;
      letter-spacing: .08em;
    }

    .hero {
      min-height: 70vh;
      background:
        linear-gradient(rgba(20,35,26,.35), rgba(20,35,26,.72)),
        url("images/lake-shore.jpg") center/cover;
      color: white;
      display: flex;
      align-items: center;
      padding: 8vw;
    }

    h1 {
      font-size: clamp(3rem, 7vw, 6rem);
      line-height: 1;
      margin-bottom: 1rem;
    }

    .content {
      padding: 5rem 8vw;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
    }

    .card {
      background: white;
      padding: 2rem;
      border-radius: 1.5rem;
      box-shadow: 0 15px 35px rgba(0,0,0,.08);
    }

    a { color: var(--clay); }

    @media (max-width: 800px) {
      .content { grid-template-columns: 1fr; }
      nav { flex-direction: column; gap: 1rem; }
    }
  </style>
</head>

<body>

<nav>
  <strong>Upstate SC Young Birders</strong>
  <div>
    <a href="index.html">Home</a>
    <a href="join.html">Join</a>
  </div>
</nav>

<section class="hero">
  <div>
    <h1>Contact the Club</h1>
    <p>Reach out about walks, photography, conservation projects, or getting involved.</p>
  </div>
</section>

<section class="content">
  <div class="card">
    <h2>Email</h2>
    <p>
      <a href="mailto:upstatesc.youngbirders@gmail.com">
        upstatesc.youngbirders@gmail.com
      </a>
    </p>
  </div>

  <div class="card">
    <h2>Social</h2>
    <p>Instagram: @upstatescyoungbirders</p>
    <p>Location: Upstate South Carolina</p>
  </div>
</section>

</body>
</html>
